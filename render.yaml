services:
  # Backend API
  - type: web
    name: ai-outreach-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: API_AUTH_KEY
        generateValue: true

  # Frontend Dashboard
  - type: web
    name: ai-outreach-dashboard
    env: static
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    rootDir: client
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-outreach-api
          type: web
          property: url
      - key: VITE_API_AUTH_KEY
        fromService:
          name: ai-outreach-api
          type: web
          property: envVar
          envVarKey: API_AUTH_KEY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
