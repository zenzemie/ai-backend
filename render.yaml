envVarGroups:
  - name: ai-outreach-shared
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: API_AUTH_KEY
        generateValue: true

services:
  # Backend API
  - type: web
    name: ai-outreach-api
    env: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - fromGroup: ai-outreach-shared

  # Frontend Dashboard
  - type: web
    name: ai-outreach-dashboard
    env: node
    plan: free
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://ai-outreach-api.onrender.com/api
      - fromGroup: ai-outreach-shared
