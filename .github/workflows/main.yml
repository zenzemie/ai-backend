name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          client/package-lock.json

    - name: Install Backend
      run: |
        cd server
        npm install --prefer-offline --no-audit

    - name: Install Frontend
      run: |
        cd client
        npm install --prefer-offline --no-audit

    - name: Build Frontend
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
        VITE_API_URL: "https://mock-url.com/api"
        VITE_API_AUTH_KEY: "mock-key"
      run: |
        cd client
        npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        continue-on-error: true
        run: |
          if [ "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" != "" ]; then
            curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          else
            echo "Deploy hook not configured. Skipping automated deploy."
          fi
