apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-repo/ai-backend.git
    targetRevision: HEAD
    path: deploy/helm/ai-backend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
